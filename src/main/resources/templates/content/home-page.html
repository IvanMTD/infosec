<div class="stat-wrapper h-100">
    <div class="container-fluid px-4">

        <!-- Filter Bar Card -->
        <div class="stat-filter-card">

            <div class="stat-filter-card__header">
                <span class="stf-b1"></span>
                <span class="stf-b2"></span>
                <span class="stf-b3"></span>
                <span class="stf-b4"></span>
                <span class="stf-m1"></span>
                <span class="stf-m2"></span>
                <span class="stf-m3"></span>
                <span class="stf-m4"></span>
                <span class="stf-f1"></span>
                <span class="stf-f2"></span>
                <span class="stf-f3"></span>
                <span class="stf-f4"></span>

                <div class="stat-filter-card__icon">
                    <i class="bi bi-bar-chart-fill"></i>
                </div>
                <div>
                    <div class="stat-filter-card__title" id="chart-title">Общая статистика</div>
                </div>
            </div>

            <div class="stat-filter-card__body d-flex justify-content-end">
                <div class="stat-period-links">
                    <button class="stat-period-link active" id="btn-day" onclick="setupChart('day')">
                        <i class="bi bi-calendar3"></i> День
                    </button>
                    <button class="stat-period-link" id="btn-week" onclick="setupChart('week')">
                        <i class="bi bi-calendar3-week"></i> Неделя
                    </button>
                    <button class="stat-period-link" id="btn-month" onclick="setupChart('month')">
                        <i class="bi bi-calendar2-check"></i> Месяц
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stat-grid" style="grid-template-columns: 1fr;">
            <!-- Chart Card -->
            <div class="stat-chart-card">
                <div class="stat-chart-card__header">Диаграмма</div>
                <div class="stat-chart-card__body">
                    <div id="category-chart" style="width:100%; min-height:500px;"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
    /* ===== ДАННЫЕ ИЗ МОДЕЛИ ===== */
    var year = [[${year}]];
    var categoryTitle = [[${categoryTitle}]];
    var chartDay = [[${categoryChartDay}]];
    var chartWeek = [[${categoryChartWeek}]];
    var chartMonth = [[${categoryChartMonth}]];
    var troubleTitle = [[${troubleTitle}]];
    var troubleChartData = [[${troubleChart}]];

    /* ===== ТЕКУЩИЙ ЭКЗЕМПЛЯР ГРАФИКА ===== */
    var currentChart = null;

    /* ===== ПОСТРОЕНИЕ СЕРИЙ ДЛЯ РАЗНЫХ РЕЖИМОВ ===== */
    function buildDaySeries() {
        var series = [];
        for (var i = 0; i < categoryTitle.length; i++) {
            var data = [];
            for (var j = 0; j < chartDay.length; j++) {
                data.push(chartDay[j].taskOnTrouble[i]);
            }
            series.push({ name: categoryTitle[i].name, data: data });
        }
        return series;
    }

    function buildDayCategories() {
        return chartDay.map(function(item) { return item.date; });
    }

    function buildWeekSeries() {
        var series = [];
        for (var i = 0; i < categoryTitle.length; i++) {
            var data = [];
            for (var j = 0; j < chartWeek.length; j++) {
                data.push(chartWeek[j].charts[i].taskCount);
            }
            series.push({ name: categoryTitle[i].name, data: data });
        }
        return series;
    }

    function buildWeekCategories() {
        return chartWeek.map(function(item) { return item.title; });
    }

    function buildMonthSeries() {
        var series = [];
        for (var i = 0; i < categoryTitle.length; i++) {
            var data = [];
            for (var j = 0; j < chartMonth.length; j++) {
                data.push(chartMonth[j].charts[i].taskCount);
            }
            series.push({ name: categoryTitle[i].name, data: data });
        }
        return series;
    }

    function buildMonthCategories() {
        return chartMonth.map(function(item) { return item.title; });
    }

    function getChartTitle(mode) {
        if (mode === 'day') return 'Общая статистика по дням за ' + year + ' год';
        if (mode === 'week') return 'Общая статистика по неделям за ' + year + ' год';
        return 'Общая статистика по месяцам за ' + year + ' год';
    }

    /* ===== ОСНОВНАЯ ФУНКЦИЯ ОТРИСОВКИ ===== */
    function drawChart(mode) {
        if (currentChart) {
            currentChart.destroy();
            currentChart = null;
        }

        var series, categories;
        if (mode === 'day') {
            series = buildDaySeries();
            categories = buildDayCategories();
        } else if (mode === 'week') {
            series = buildWeekSeries();
            categories = buildWeekCategories();
        } else {
            series = buildMonthSeries();
            categories = buildMonthCategories();
        }

        var options = {
            series: series,
            chart: {
                type: 'bar',
                height: 550,
                stacked: true,
                toolbar: { show: false },
                redrawOnWindowResize: true,
                animations: { enabled: true, easing: 'easeinout', speed: 500 }
            },
            colors: generateColors(categoryTitle.length),
            title: {
                text: getChartTitle(mode),
                align: 'center',
                style: { fontSize: '14px', fontWeight: '600', color: '#444' }
            },
            plotOptions: {
                bar: {
                    horizontal: false,
                    borderRadius: 2,
                    borderRadiusApplication: 'end',
                    borderRadiusWhenStacked: 'last',
                    columnWidth: '70%'
                }
            },
            dataLabels: { enabled: false },
            stroke: { width: 0 },
            xaxis: {
                categories: categories,
                labels: { rotate: -45, style: { fontSize: '11px' } }
            },
            yaxis: {
                title: { text: 'Всего выполнено' },
                allowDecimals: false
            },
            legend: { position: 'bottom', horizontalAlign: 'center', fontSize: '12px' },
            tooltip: {
                shared: true,
                intersect: false,
                y: {
                    formatter: function(val, opts) {
                        var idx = opts.seriesIndex;
                        var desc = (categoryTitle[idx] && categoryTitle[idx].description)
                            ? categoryTitle[idx].description
                            : '';
                        return desc + '\nВсего: ' + val;
                    }
                }
            },
            responsive: [{
                breakpoint: 768,
                options: {
                    legend: { position: 'bottom' },
                    xaxis: { labels: { rotate: -90, style: { fontSize: '10px' } } }
                }
            }]
        };

        currentChart = new ApexCharts(document.querySelector('#category-chart'), options);
        currentChart.render();

        /* Обновляем заголовок фильтр-бара */
        document.getElementById('chart-title').innerText = getChartTitle(mode);

        /* Переключаем активную кнопку */
        document.querySelectorAll('.stat-period-link').forEach(function(btn) {
            btn.classList.remove('active');
        });
        var activeBtn = document.getElementById('btn-' + mode);
        if (activeBtn) activeBtn.classList.add('active');
    }

    function setupChart(mode) {
        drawChart(mode);
    }

    document.addEventListener('DOMContentLoaded', function() {
        drawChart('day');
    });
</script>
