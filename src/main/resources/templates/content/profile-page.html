<div class="profile-wrapper h-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Profile Card -->
                <div class="profile-card">

                    <!-- Card Header — 12 smoke particles -->
                    <div class="profile-card__header">
                        <!-- BACK layer -->
                        <span class="smoke-b1"></span>
                        <span class="smoke-b2"></span>
                        <span class="smoke-b3"></span>
                        <span class="smoke-b4"></span>
                        <!-- MID layer -->
                        <span class="smoke-m1"></span>
                        <span class="smoke-m2"></span>
                        <span class="smoke-m3"></span>
                        <span class="smoke-m4"></span>
                        <!-- FRONT layer -->
                        <span class="smoke-f1"></span>
                        <span class="smoke-f2"></span>
                        <span class="smoke-f3"></span>
                        <span class="smoke-f4"></span>

                        <div class="profile-card__avatar" th:text="${#strings.isEmpty(user.getFirstname()) ? '?' : #strings.substring(user.getFirstname(),0,1)} + ${#strings.isEmpty(user.getLastname()) ? '?' : #strings.substring(user.getLastname(),0,1)}">ФИ</div>
                        <div>
                            <div class="profile-card__title">Профиль пользователя</div>
                            <div class="profile-card__subtitle" th:text="${user.getEmail()}"></div>
                        </div>
                    </div>

                    <!-- Card Body — single column -->
                    <div class="profile-card__body">
                        <div class="info-card">
                            <div class="info-card__label">Почта (Логин)</div>
                            <div class="info-card__value" th:text="${user.getEmail()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Фамилия</div>
                            <div class="info-card__value" th:text="${user.getLastname()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Имя</div>
                            <div class="info-card__value" th:text="${user.getFirstname()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Отчество</div>
                            <div class="info-card__value" th:text="${user.getMiddleName()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Должность</div>
                            <div class="info-card__value" th:text="${user.getOfficePosition()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Текущая роль</div>
                            <div class="info-card__value" th:text="${user.getRole().getTitle()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Служба</div>
                            <div class="info-card__value" th:text="${user.getDepartmentRole().getTitle()}"></div>
                        </div>
                        <div class="info-card">
                            <div class="info-card__label">Конец рабочего дня</div>
                            <div class="info-card__value" th:text="${user.getWorkDayEnd() != null ? user.getWorkDayEnd() : '18:00 (по умолчанию)'}"></div>
                        </div>
                    </div>

                    <!-- Card Footer — Password Change -->
                    <div class="profile-card__footer">
                        <div class="profile-card__footer-title">Сменить пароль</div>
                        <form class="profile-form row g-2 align-items-end" th:method="POST" th:action="@{/password/change}" th:object="${pass}">
                            <div class="col-md-3">
                                <input type="password" class="form-control" placeholder="Старый пароль" th:field="*{oldPassword}">
                                <span th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}" class="field-error"></span>
                            </div>
                            <div class="col-md-3">
                                <input type="password" class="form-control" placeholder="Новый пароль" th:field="*{newPassword}">
                                <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="field-error"></span>
                            </div>
                            <div class="col-md-3">
                                <input type="password" class="form-control" placeholder="Ещё раз новый" th:field="*{newConfirm}">
                                <span th:if="${#fields.hasErrors('newConfirm')}" th:errors="*{newConfirm}" class="field-error"></span>
                            </div>
                            <div class="col-md-3">
                                <button type="submit" class="btn btn-smoke w-100">
                                    <i class="bi bi-lock-fill"></i> Сменить
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Sync with AD button (admin only) -->
                    <div class="profile-card__footer" th:if="${admin}">
                        <div class="mb-2">
                            <label class="info-card__label">LDAP URL</label>
                            <input type="text" id="ldapUrl" class="form-control form-control-sm" placeholder="ldap://dc.domain.ru:389">
                        </div>
                        <div class="mb-2">
                            <label class="info-card__label">LDAP Base DN</label>
                            <input type="text" id="ldapBase" class="form-control form-control-sm" placeholder="OU=Подразделение,DC=domain,DC=ru">
                        </div>
                        <div class="mb-2">
                            <label class="info-card__label">LDAP Bind DN</label>
                            <input type="text" id="ldapBindDn" class="form-control form-control-sm" placeholder="CN=svc-user,OU=Service Accounts,DC=domain,DC=ru">
                        </div>
                        <div class="mb-2">
                            <label class="info-card__label">LDAP Bind Password</label>
                            <input type="password" id="ldapBindPass" class="form-control form-control-sm" placeholder="••••••••">
                        </div>
                        <div class="form-check form-switch mb-2" th:if="${admin}">
                            <input class="form-check-input" type="checkbox" id="ldapSyncToggle" onchange="toggleLdapSync()">
                            <label class="form-check-label" for="ldapSyncToggle" style="font-size:0.82rem;color:#aaa;">LDAP синхронизация</label>
                        </div>
                        <div id="ldapError" style="color:#dc3545;font-size:0.82rem;display:none;word-break:break-all;" class="mb-2"></div>
                        <button class="btn btn-smoke w-100" id="syncBtn" style="display:none;" onclick="syncDirectory()">
                            <i class="bi bi-arrow-repeat"></i> Синхронизировать с AD
                        </button>
                    </div>

                </div>
                <!-- /Profile Card -->

            </div>
        </div>
    </div>
</div>

<script>
function syncDirectory() {
    if (!confirm('Запустить синхронизацию справочника с Active Directory? Это может занять несколько секунд.')) return;
    var btn = event.target;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Синхронизация...';

    var csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
    var csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
    var headers = { 'Content-Type': 'application/json' };
    headers[csrfHeader] = csrfToken;

    fetch('/api/admin/sync-directory', {
        method: 'POST',
        headers: headers
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        alert('Готово!\nИз AD: ' + data.adTotal + '\nСоздано: ' + data.created + '\nОбновлено: ' + data.updated + '\nОткреплено: ' + data.unlinked);
        location.reload();
    })
    .catch(function(e) {
        alert('Ошибка: ' + e);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Синхронизировать с AD';
    });
}

// Init LDAP toggle
(function(){
    fetch('/api/admin/settings/ldap-config')
    .then(function(r) { return r.json(); })
    .then(function(cfg) {
        document.getElementById('ldapUrl').value = cfg['ldap.url'] || '';
        document.getElementById('ldapBase').value = cfg['ldap.base'] || '';
        document.getElementById('ldapBindDn').value = cfg['ldap.bind.dn'] || '';
        var pass = cfg['ldap.bind.pass'] || '';
        if (pass === '***') {
            document.getElementById('ldapBindPass').value = '';
            document.getElementById('ldapBindPass').placeholder = '•••••••• (сохранён)';
        } else {
            document.getElementById('ldapBindPass').value = pass;
        }
        var enabled = cfg['ldap.sync.enabled'] === 'true';
        document.getElementById('ldapSyncToggle').checked = enabled;
        document.getElementById('syncBtn').style.display = enabled ? '' : 'none';
    });
})();

function toggleLdapSync() {
    var enabled = document.getElementById('ldapSyncToggle').checked;
    var url = document.getElementById('ldapUrl').value.trim();
    var base = document.getElementById('ldapBase').value.trim();
    var dn = document.getElementById('ldapBindDn').value.trim();
    var pass = document.getElementById('ldapBindPass').value;
    var errDiv = document.getElementById('ldapError');

    if (enabled) {
        if (!url || !base || !dn) {
            errDiv.textContent = 'Заполните URL, Base DN и Bind DN';
            errDiv.style.display = '';
            document.getElementById('ldapSyncToggle').checked = false;
            return;
        }
        if (!pass && document.getElementById('ldapBindPass').placeholder.indexOf('сохранён') < 0) {
            errDiv.textContent = 'Введите пароль';
            errDiv.style.display = '';
            document.getElementById('ldapSyncToggle').checked = false;
            return;
        }
        // Сохраняем настройки и тестируем соединение
        var csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
        var csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
        var headers = { 'Content-Type': 'application/json' };
        headers[csrfHeader] = csrfToken;

        fetch('/api/admin/settings/ldap-config', {
            method: 'PUT',
            headers: headers,
            body: JSON.stringify({
                'ldap.url': url,
                'ldap.base': base,
                'ldap.bind.dn': dn,
                'ldap.bind.pass': pass,
                'ldap.sync.enabled': 'true'
            })
        })
        .then(function() { return fetch('/api/admin/settings/ldap-test', { method: 'POST', headers: headers }); })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.ok) {
                errDiv.style.display = 'none';
                document.getElementById('syncBtn').style.display = '';
            } else {
                errDiv.textContent = 'Ошибка подключения: ' + (res.error || 'неизвестная');
                errDiv.style.display = '';
                document.getElementById('ldapSyncToggle').checked = false;
                document.getElementById('syncBtn').style.display = 'none';
            }
        });
    } else {
        errDiv.style.display = 'none';
        document.getElementById('syncBtn').style.display = 'none';
        var csrfToken = document.querySelector("meta[name='_csrf']").getAttribute("content");
        var csrfHeader = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
        var headers = { 'Content-Type': 'application/json' };
        headers[csrfHeader] = csrfToken;
        fetch('/api/admin/settings/ldap-sync', {
            method: 'PUT', headers: headers,
            body: JSON.stringify({ enabled: false })
        });
    }
}
</script>
