<div class="stat-wrapper h-100">
    <div class="container-fluid px-4">

        <!-- Filter Bar Card -->
        <div class="stat-filter-card">

            <div class="stat-filter-card__header">
                <span class="stf-b1"></span>
                <span class="stf-b2"></span>
                <span class="stf-b3"></span>
                <span class="stf-b4"></span>
                <span class="stf-m1"></span>
                <span class="stf-m2"></span>
                <span class="stf-m3"></span>
                <span class="stf-m4"></span>
                <span class="stf-f1"></span>
                <span class="stf-f2"></span>
                <span class="stf-f3"></span>
                <span class="stf-f4"></span>

                <div class="stat-filter-card__icon">
                    <i class="bi bi-clipboard-data"></i>
                </div>
                <div>
                    <div class="stat-filter-card__title" th:text="'Показатели: ' + ${userName}">Показатели</div>
                </div>

                <button class="stat-export-btn" onclick="exportExcel()" title="Выгрузить отчёт в Excel">
                    <i class="bi bi-file-earmark-excel"></i> Выгрузка отчёта
                </button>
            </div>

            <div class="stat-filter-card__body d-flex justify-content-end">
                <div class="stat-period-links">
                    <a class="stat-period-link" th:href="@{/task/info/week}">
                        <i class="bi bi-calendar3-week"></i> Неделя
                    </a>
                    <a class="stat-period-link" th:href="@{/task/info/month}">
                        <i class="bi bi-calendar3"></i> Месяц
                    </a>
                    <a class="stat-period-link" th:href="@{/task/info/year}">
                        <i class="bi bi-calendar2-check"></i> Год
                    </a>

                    <!-- Date range form -->
                    <form th:method="POST" th:action="@{/task/info/date}" th:object="${dates}" class="stat-date-form">
                        <input type="date" class="form-control" th:field="*{begin}">
                        <span class="field-error" th:if="${#fields.hasErrors('begin')}" th:errors="*{begin}"></span>
                        <span style="color:#aaa;">—</span>
                        <input type="date" class="form-control" th:field="*{end}">
                        <span class="field-error" th:if="${#fields.hasErrors('end')}" th:errors="*{end}"></span>
                        <button type="submit" class="btn btn-smoke">Показать</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stat-grid">
            <!-- Summary Card -->
            <div class="stat-summary-card">
                <div class="stat-summary-card__header">Общие показатели</div>
                <div class="stat-summary-card__body">
                    <div class="stat-total__label">Всего заявок</div>
                    <div class="stat-total" th:text="${taskList.size()}">0</div>

                    <div class="stat-breakdown" th:if="${statistics.size() > 0}">
                        <div th:each="st : ${statistics}">
                            <div th:each="tr : ${st.getTroubles()}">
                                <div th:if="${tr.getTasks().size() != 0}" class="stat-breakdown-item">
                                    <span class="stat-breakdown-item__label" th:text="${st.getTitle()} + ' — ' + ${tr.getTitle()}"></span>
                                    <span class="stat-breakdown-item__count" th:text="${tr.getTasks().size()}"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:if="${statistics.size() == 0}" class="stat-empty">
                        Нет данных для отображения
                    </div>
                </div>
            </div>

            <!-- Chart Card -->
            <div class="stat-chart-card">
                <div class="stat-chart-card__header">Диаграмма</div>
                <div class="stat-chart-card__body">
                    <div id="donut_chart" style="width:100%; height:400px;"></div>
                </div>
            </div>
        </div>

        <!-- Accordion Card -->
        <div class="stat-accordion-card" th:if="${statistics.size() > 0}">
            <div class="stat-accordion-card__header d-flex justify-content-between align-items-center">
                <span>Детализация по категориям</span>
                <button class="btn btn-sm btn-outline-secondary" id="toggle-all-accordions" onclick="toggleAllAccordions()" style="font-size:0.75rem;">
                    <i class="bi bi-chevron-expand"></i> Открыть все
                </button>
            </div>
            <div class="stat-accordion-card__body">
                <div class="accordion stat-accordion" id="mainAccordion">
                    <div class="accordion-item" th:each="stat, s : ${statistics}" th:if="${stat.isShow}">
                        <h2 class="accordion-header">
                            <button class="accordion-button" th:id="'id-' + ${s.index}" type="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse' + ${s.index}" aria-expanded="true" th:attr="aria-controls='collapse' + ${s.index}">
                                <span th:text="${stat.getTitle()}"></span>
                            </button>
                        </h2>
                        <div th:id="'collapse-' + ${s.index}" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <div class="accordion stat-accordion" th:id="'accordion' + ${s.index}">
                                    <div class="stat-empty" th:if="${stat.getTroubles.size() == 0}">
                                        Отсутствуют задачи в группе
                                    </div>
                                    <div th:if="${stat.getTroubles.size() != 0}">
                                        <div class="accordion-item" th:each="trouble, s2 : ${stat.getTroubles()}" th:if="${trouble.isShow}">
                                            <h2 class="accordion-header">
                                                <button class="accordion-button" th:id="'id' + ${s.index} + ${s2.index}" type="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse-' + ${s.index} + ${s2.index}" aria-expanded="true" th:attr="aria-controls='collapse-' + ${s.index} + ${s2.index}">
                                                    <span th:text="${trouble.getTitle()} + ' — заявок: ' + ${trouble.getTasks().size()}"></span>
                                                </button>
                                            </h2>
                                            <div th:id="'collapse-' + ${s.index} + ${s2.index}" class="accordion-collapse collapse show">
                                                <div class="accordion-body">
                                                    <div th:if="${trouble.getTasks().size() == 0}" class="stat-empty">
                                                        Нет выполненных заявок
                                                    </div>
                                                    <div th:if="${trouble.getTasks().size() != 0}">
                                                        <div class="card" th:each="task : ${trouble.getTasks()}">
                                                            <div class="card-header" th:text="'Исполнитель: ' + ${task.getUsername()}"></div>
                                                            <div class="card-body">
                                                                <h5 class="card-title" th:text="'Пользователь или описание: ' + ${task.getTitle()}"></h5>
                                                                <p class="card-text" th:text="${task.getContent()}"></p>
                                                                <p class="card-text small text-secondary" th:if="${task.getTimeInfo() != null}" th:text="${task.getTimeInfo()}"></p>
                                                                <p class="card-text small text-muted" th:unless="${task.getTimeInfo() != null}">Время выполнения не было указано</p>
                                                                <p class="card-text" th:text="${task.getDate()}"></p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <script th:inline="javascript">
                                                if([[${s2.index}]] == 0){
                                                    document.getElementById('id' + [[${s.index}]] + [[${s2.index}]]).setAttribute('class','accordion-button');
                                                    document.getElementById('collapse-' + [[${s.index}]] + [[${s2.index}]]).setAttribute('class','accordion-collapse collapse show');
                                                }else{
                                                    document.getElementById('id' + [[${s.index}]] + [[${s2.index}]]).setAttribute('class','accordion-button collapsed');
                                                    document.getElementById('collapse-' + [[${s.index}]] + [[${s2.index}]]).setAttribute('class','accordion-collapse collapse');
                                                }
                                                document.getElementById('id' + [[${s.index}]] + [[${s2.index}]]).setAttribute('data-bs-target','#collapse-' + [[${s.index}]] + [[${s2.index}]]);
                                                document.getElementById('collapse-' + [[${s.index}]] + [[${s2.index}]]).setAttribute('data-bs-parent','#accordion' + [[${s.index}]]);
                                            </script>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <script th:inline="javascript">
                            if([[${s.index}]] == 0){
                                document.getElementById('id-' + [[${s.index}]]).setAttribute('class','accordion-button');
                                document.getElementById('collapse-' + [[${s.index}]]).setAttribute('class','accordion-collapse collapse show');
                            }else{
                                document.getElementById('id-' + [[${s.index}]]).setAttribute('class','accordion-button collapsed');
                                document.getElementById('collapse-' + [[${s.index}]]).setAttribute('class','accordion-collapse collapse');
                            }
                            document.getElementById('id-' + [[${s.index}]]).setAttribute('data-bs-target','#collapse-' + [[${s.index}]]);
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="stat-empty" th:if="${statistics.size() == 0}">
            <hr>
            Отсутствуют группы — обратитесь к Администратору
        </div>

    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        let charts = [[${charts}]];
        if (!charts || charts.length === 0) return;

        var options = {
            series: charts.map(function(c) { return c.taskCount; }),
            labels: charts.map(function(c) { return c.title; }),
            chart: {
                type: 'donut',
                height: 380,
                redrawOnWindowResize: true,
                animations: { enabled: true, easing: 'easeinout', speed: 500 }
            },
            colors: generateColors(charts.length),
            title: {
                text: 'Выполнено за ' + charts[0].status,
                align: 'center',
                style: { fontSize: '14px', fontWeight: '600', color: '#444' }
            },
            plotOptions: {
                pie: {
                    donut: { size: '45%' }
                }
            },
            legend: { position: 'right', fontSize: '12px' },
            tooltip: {
                y: {
                    formatter: function(val, opts) {
                        var idx = opts.seriesIndex;
                        var desc = (charts[idx] && charts[idx].description) ? charts[idx].description : '';
                        return desc + '\nВсего: ' + val;
                    }
                }
            },
            responsive: [{
                breakpoint: 768,
                options: { legend: { position: 'bottom' } }
            }]
        };

        var chart = new ApexCharts(document.querySelector('#donut_chart'), options);
        chart.render();
    });

    /* PDF Export — browser print (no canvas limit) */
    function toggleAllAccordions(){
        var collapses = document.querySelectorAll('#mainAccordion .accordion-collapse');
        var buttons = document.querySelectorAll('#mainAccordion .accordion-button');
        var total = collapses.length;
        var openCount = document.querySelectorAll('#mainAccordion .accordion-collapse.show').length;

        if(openCount === total){
            collapses.forEach(function(c) { c.classList.remove('show'); });
            buttons.forEach(function(b) { b.classList.add('collapsed'); b.setAttribute('aria-expanded','false'); });
            document.getElementById('toggle-all-accordions').innerHTML = '<i class="bi bi-chevron-expand"></i> Открыть все';
        } else {
            collapses.forEach(function(c) { c.classList.add('show'); });
            buttons.forEach(function(b) { b.classList.remove('collapsed'); b.setAttribute('aria-expanded','true'); });
            document.getElementById('toggle-all-accordions').innerHTML = '<i class="bi bi-chevron-contract"></i> Закрыть все';
        }
    }

    function exportExcel() {
        var path = window.location.pathname; // /task/info/week
        var parts = path.split('/');
        var mode = (parts.length > 3) ? parts[3] : 'week';
        var baseUrl = '/api/report/excel?mode=' + mode + '&userId=-1';

        var dateFrom = /*[[${dates.begin}]]*/ '';
        var dateTo = /*[[${dates.end}]]*/ '';
        if(dateFrom && dateTo){
            baseUrl += '&dateFrom=' + dateFrom + '&dateTo=' + dateTo;
            baseUrl = baseUrl.replace(/mode=\w+/, 'mode=date');
        }

        window.open(baseUrl, '_blank');
    }

    function exportPDF() {
        document.querySelectorAll('.accordion-collapse').forEach(c => c.classList.add('show'));
        document.querySelectorAll('.accordion-button.collapsed').forEach(b => b.classList.remove('collapsed'));

        var filterBody = document.querySelector('.stat-filter-card__body');
        var exportBtn = document.querySelector('.stat-export-btn');
        if(filterBody) filterBody.style.display = 'none';
        if(exportBtn) exportBtn.style.display = 'none';

        setTimeout(function(){
            window.print();

            setTimeout(function(){
                if(filterBody) filterBody.style.display = '';
                if(exportBtn) exportBtn.style.display = '';
            }, 500);
        }, 400);
    }
</script>
