        <script>
            $.ajax({
                url:'/api/service/get/ip',
                type:'get',
                success: function (ip){
                    /* IP в шапке */
                    document.getElementById('header-ip').textContent = ip;
                    /* водяной знак */
                    var container = document.querySelector('#guide-card-col').parentElement;
                    container.style.position = 'relative';
                    /* водяной знак — слой под карточками */
                    var watermarkLayer = document.createElement('div');
                    watermarkLayer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;';
                    container.insertBefore(watermarkLayer, container.firstChild);
                    /* генерируем водяной знак IP по диагонали */
                    var cols = 8, rows = 12;
                    for(var r=0; r<rows; r++){
                        for(var c=0; c<cols; c++){
                            var span = document.createElement('span');
                            span.textContent = ip;
                            span.style.cssText =
                                'position:absolute;' +
                                'pointer-events:none;user-select:none;' +
                                'color:rgba(0,0,0,0.04);' +
                                'font-size:14px;font-weight:600;' +
                                'top:' + (r * 100 / rows) + '%;' +
                                'left:' + (c * 100 / cols + 3) + '%;' +
                                'transform:rotate(-30deg);' +
                                'z-index:0;';
                            watermarkLayer.appendChild(span);
                        }
                    }
                }
            });
        </script>

<script>
    const modal = document.getElementById('person-modal');

    modal.addEventListener('hidden.bs.modal', function () {
        const form = document.getElementById('person-modal-form');
        form.reset();
        form.classList.remove('was-validated');
    });

    document.querySelectorAll('.blur');
</script>

<script th:inline="javascript">
    let departments = [[${guide}]].departments;
    let admin = [[${admin}]] || [[${gAdmin}]];

    function showDepartmentAndDivision(eid){
        var depId = 0;
        var divId = 0;

        for (var i = 0; i < departments.length; i++) {
            var eList = departments[i].employees;
            for (var k = 0; k < eList.length; k++) {
                if (`${eList[k].id}` === eid) {
                    depId = departments[i].id;
                    divId = 0;
                    break;
                }
            }

            var divisions = departments[i].divisions;
            for (var j = 0; j < divisions.length; j++) {
                eList = divisions[j].employees;
                for (var b = 0; b < eList.length; b++) {
                    if (`${eList[b].id}` === eid) {
                        depId = departments[i].id;
                        divId = divisions[j].id;
                        break;
                    }
                }
            }
        }

        var depBtnId = 0;
        var divBtnId = 0;

        var depBtn = document.querySelectorAll('.department');
        for(var i=0; i<depBtn.length; i++){
            var data = depBtn[i].getAttribute('my-data');
            if(data == depId){
                depBtnId = depBtn[i].id;
            }
        }

        lightOnDepartmentBtn(depBtnId);

        var divBtn = document.querySelectorAll('.division');
        for(var i=0; i<divBtn.length; i++){
            var data = divBtn[i].getAttribute('my-data');
            if(data == divId){
                divBtn[i].setAttribute('class','btn btn-sm btn-secondary division text-start w-100' + (admin ? ' rounded-bottom-0 d-flex align-items-center' : ''));
            }
        }
    }

    function lightOnDepartmentBtn(buttonId){
        var data = buttonId.split('-');
        var id = data[data.length - 1];
        var department = departments[id];
        var divisions = department.divisions;

        var deptClass = admin ? 'btn btn-sm btn-outline-secondary department text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-outline-secondary department text-start w-100';
        var deptActiveClass = admin ? 'btn btn-sm btn-secondary department text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-secondary department text-start w-100';

        var activeButtons = document.querySelectorAll('.department');
        activeButtons.forEach(function(button) {
            button.setAttribute('class', deptClass);
        });

        var selectedButton = document.getElementById(buttonId);
        selectedButton.setAttribute('class', deptActiveClass);

        var count = 0;
        $('#division-grid').empty();
        divisions.forEach(function (division){
            var html = '<div class="shadow-sm rounded">';
            html += '<button id="btn-div-' + id + '-' + count + '" my-data="' + division.id + '" class="btn btn-sm btn-outline-secondary division text-start w-100' + (admin ? ' rounded-bottom-0 d-flex align-items-center' : '') + '" type="button" onclick="selectDivision(this.id)">';
            if(admin){
                html += '<i class="bi bi-grip-vertical text-secondary me-2 grip-handle" style="cursor: grab;"></i>';
            }
            html += division.title + '</button>';
            if(admin){
                html += '<div class="bg-primary-subtle rounded-bottom d-flex">';
                html += '<div class="btn-group m-auto py-1">';
                html += '<button class="btn btn-sm btn-outline-secondary" onclick="editDivision(' + division.id + ')"><i class="bi bi-pencil-square"></i> Редактировать</button>';
                html += '<button class="btn btn-sm btn-outline-secondary" onclick="deleteDivision(' + division.id + ')"><i class="bi bi-trash"></i> Удалить</button>';
                html += '</div></div>';
            }
            html += '</div>';
            $('#division-grid').append(html);
            count++;
        });
        initDivisionSortable();
    }

    function selectDepartment(buttonId){
        var data = buttonId.split('-');
        var id = data[data.length - 1];
        var department = departments[id];
        var divisions = department.divisions;

        var deptClass = admin ? 'btn btn-sm btn-outline-secondary department text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-outline-secondary department text-start w-100';
        var deptActiveClass = admin ? 'btn btn-sm btn-secondary department text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-secondary department text-start w-100';

        var activeButtons = document.querySelectorAll('.department');
        activeButtons.forEach(function(button) {
            button.setAttribute('class', deptClass);
        });

        var selectedButton = document.getElementById(buttonId);
        selectedButton.setAttribute('class', deptActiveClass);

        var count = 0;
        $('#division-grid').empty();
        divisions.forEach(function (division){
            var html = '<div class="shadow-sm rounded">';
            html += '<button id="btn-div-' + id + '-' + count + '" my-data="' + division.id + '" class="btn btn-sm btn-outline-secondary division text-start w-100' + (admin ? ' rounded-bottom-0 d-flex align-items-center' : '') + '" type="button" onclick="selectDivision(this.id)">';
            if(admin){
                html += '<i class="bi bi-grip-vertical text-secondary me-2 grip-handle" style="cursor: grab;"></i>';
            }
            html += division.title + '</button>';
            if(admin){
                html += '<div class="bg-primary-subtle rounded-bottom d-flex">';
                html += '<div class="btn-group m-auto py-1">';
                html += '<button class="btn btn-sm btn-outline-secondary" onclick="editDivision(' + division.id + ')"><i class="bi bi-pencil-square"></i> Редактировать</button>';
                html += '<button class="btn btn-sm btn-outline-secondary" onclick="deleteDivision(' + division.id + ')"><i class="bi bi-trash"></i> Удалить</button>';
                html += '</div></div>';
            }
            html += '</div>';
            $('#division-grid').append(html);
            count++;
        });

        $('#guide-card-col').empty();
        department.employees.forEach(function (employee){
            employeeAppend(employee);
        });
        initEmployeeSortable();
    }

    function selectDivision(buttonId){
        var parts = buttonId.split('-');
        var departmentId = parts[parts.length-2];
        var divisionId = parts[parts.length-1];
        var department = departments[departmentId];
        var division = department.divisions[divisionId];

        var divClass = admin ? 'btn btn-sm btn-outline-secondary division text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-outline-secondary division text-start w-100';
        var divActiveClass = admin ? 'btn btn-sm btn-secondary division text-start w-100 rounded-bottom-0 d-flex align-items-center' : 'btn btn-sm btn-secondary division text-start w-100';

        var activeButtons = document.querySelectorAll('.division');
        activeButtons.forEach(function(button) {
            button.setAttribute('class', divClass);
        });

        var selectedButton = document.getElementById(buttonId);
        selectedButton.setAttribute('class', divActiveClass);

        $('#guide-card-col').empty();
        division.employees.forEach(function (employee){
            employeeAppend(employee);
        });
        initEmployeeSortable();
    }

    function sendEmployeeData(employeeData){
        var structData = getCurrentSelectedData();
        console.log(structData);

        var request = null;

        if(employeeData != null){
            request = {
                id: employeeData.id,
                lastname: employeeData.lastname,
                name: employeeData.name,
                middleName: employeeData.middleName,
                location: employeeData.address,
                office: employeeData.cabinet,
                shortNumber: employeeData.phone,
                personalPhone: employeeData.personalPhone,
                position: employeeData.position,
                email: employeeData.email,
                department: structData.department,
                division: structData.division
            }
            console.log(request);
        }else {

            const form = document.getElementById('person-modal-form');
            if (!form.checkValidity()) {
                // Пометить неверные поля как invalid
                form.classList.add('was-validated');
                return;
            }

            request = {
                id: 0,
                lastname: $('#lastname').val(),
                name: $('#name').val(),
                middleName: $('#middleName').val(),
                location: $('#location').val(),
                office: $('#office').val(),
                shortNumber: $('#short-number').val(),
                personalPhone: $('#personal-phone').val(),
                position: $('#position').val(),
                email: $('#email').val(),
                department: structData.department,
                division: structData.division
            }
        }

        console.log(request);

        let csrf = [[${_csrf}]];
        let header = csrf.headerName;
        let token = csrf.token;

        $.ajax({
            url: '/api/add/employee',
            method:'POST',
            data: JSON.stringify(request),
            contentType:'application/json',
            beforeSend: function(xhr) {
                xhr.setRequestHeader(header, token);
            },
            success: function (response){
                if(request.division != 0){
                    departments[structData.departmentIndex].divisions[structData.divisionIndex].employees.push(response);
                }else{
                    departments[structData.departmentIndex].employees.push(response);
                }
                employeeAppend(response);
                $('#person-modal').modal('hide');
            }
        });

    }

    function searchFreeEmployees(){
        let query = $('#search-free-employees').val();
        $.ajax({
            url:'/api/search/free/employees',
            type:'get',
            data: {
                query: query
            },
            success: function (response){
                let datalist = $('#free-employee-list');
                datalist.empty();
                response.forEach(function (employee){
                    datalist.append(
                        '<option value="' + employee.fullName + '" my-data="' + JSON.stringify(employee).replace(/"/g, '&quot;') + '"></option>'
                    );
                });
            }
        });
    }

    function setupEmployee(){
        let employeeSearch = document.getElementById('search-free-employees').value;
        let dataList = document.getElementById('free-employee-list').options;
        for(let i=0; i<dataList.length; i++){
            if(dataList[i].value === employeeSearch){
                let employee = JSON.parse(dataList[i].getAttribute('my-data').replace(/&quot;/g, '"'));
                sendEmployeeData(employee);
            }
        }
    }

    function getCurrentSelectedData(){
        let selectedButtons = document.querySelectorAll('button.btn-secondary');
        let departmentButton = selectedButtons[0];
        let depParts = departmentButton.id.split('-');
        let depIndex = depParts[depParts.length - 1];
        let divisionButton = selectedButtons[1];
        let departmentId = departmentButton.getAttribute('my-data');

        if(divisionButton !== undefined){

            divIndex = divParts[divParts.length - 1];
            divisionId = divisionButton.getAttribute('my-data');
        }
        return {

            department: departmentId,
            divisionIndex: divIndex,
            division: divisionId
        }

    function pinOut(buttonId){
        let parts = buttonId.split('-');
        let id = parts[parts.length -1];
        let structure = getCurrentSelectedData();
        $.ajax({
            url:'/api/pinout/employee',
            type:'get',
            data:{
                employeeId:id
            },
            success: function (response){
                if(structure.division != 0){
                    let employees = departments[structure.departmentIndex].divisions[structure.divisionIndex].employees;
                    let employeeIndex = null;
                    for(let i=0; i<employees.length; i++){
                        if(employees[i].id == response.id){
                            employeeIndex = i;
                        }
                    }
                    departments[structure.departmentIndex].divisions[structure.divisionIndex].employees.splice(employeeIndex,1);
                    employees = departments[structure.departmentIndex].divisions[structure.divisionIndex].employees;
                    rebuildEmployees(employees);
                }else{
                    let employees = departments[structure.departmentIndex].employees;
                    let employeeIndex = null;
                    for(let i=0; i<employees.length; i++){
                        if(employees[i].id == response.id){
                            employeeIndex = i;
                        }
                    }
                    departments[structure.departmentIndex].employees.splice(employeeIndex,1);
                    employees =departments[structure.departmentIndex].employees;
                        rebuildEmployees(employees);
                }
            }
        });
    }

    function editEmployee(buttonId){

        let employee = findEmployeeById(departments,id);

    function findEmployeeById(departments, id) {
        id = parseInt(id);
        for (let department of departments) {
            // Проверяем сотрудников в департаменте
            let employee = department.employees.find(emp => emp.id === id);
            if (employee) return employee;

            // Проверяем сотрудников в подразделениях департамента
            for (let division of department.divisions) {
                employee = division.employees.find(emp => emp.id === id);
                if (employee) return employee;
            }
        }
        // Если сотрудник не найден, возвращаем null или undefined
        return null;
    }

                            <div class="row pt-2 g-2">
                                <div class="col-12 form-floating">
                                    <select class="form-select" id="div-department">
                                        ${depOptions}
                                    </select>
                                    <label for="div-department" class="ms-2">Департамент</label>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                            <button type="button" class="btn btn-outline-primary" onclick="submitDivision(${id})">Сохранить</button>
                        </div>
                    </div>
                </div>
            </div>
        `);
        let m = new bootstrap.Modal(document.getElementById('division-modal'));
        m.show();
    }

    function submitDivision(id, forceDepId){
        let data = {
            title: $('#div-title').val(),
            description: $('#div-description').val(),
            departmentId: forceDepId || $('#div-department').val()
        };

        let url;
        if(id){
            data.id = id;
            url = '/api/division/edit';
        } else {
            url = '/api/division/add';
        }

        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(){
                location.reload();
            }
        });
    }

    function deleteDivision(id){
        let div = null;
        for(let i=0; i<departments.length; i++){
            for(let j=0; j<departments[i].divisions.length; j++){
                if(departments[i].divisions[j].id == id){
                    div = departments[i].divisions[j];
                    break;
                }
            }
            if(div) break;
        }
        if(!div) return;

        let modal = $('#edit-modal-field');
        modal.empty();
        modal.append(`
            <div class="modal fade" id="delete-division-modal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header bg-danger-subtle">
                            <h5 class="modal-title"><i class="bi bi-exclamation-triangle"></i> Удаление отдела</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <p>Вы собираетесь удалить отдел <b>«${div.title}»</b>.</p>
                            <p class="text-danger">Все сотрудники этого отдела будут отвязаны.</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
                            <button type="button" class="btn btn-danger" onclick="confirmDeleteDivision(${id})">Удалить</button>
                        </div>
                    </div>
                </div>
            </div>
        `);
        let m = new bootstrap.Modal(document.getElementById('delete-division-modal'));
        m.show();
    }

    function confirmDeleteDivision(id){
        $.ajax({
            url: '/api/division/' + id,
            type: 'DELETE',
            success: function(){
                location.reload();
            }
        });
    }

    // ==================== DRAG & DROP ====================

    function initDeptSortable(){
        if(!admin) return;
        var grid = document.getElementById('department-grid');
        if(!grid) return;
        Sortable.create(grid, {
            handle: '.grip-handle',
            animation: 150,
            onEnd: function(){
                var items = document.querySelectorAll('#department-grid .department');
                var order = [];
                items.forEach(function(item, index){
                    order.push({ id: parseInt(item.getAttribute('my-data')), number: index });
                });
                $.ajax({
                    url: '/api/department/reorder',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(order)
                });
            }
        });
    }

    function initDivisionSortable(){
        if(!admin) return;
        var grid = document.getElementById('division-grid');
        if(!grid) return;
        Sortable.create(grid, {
            handle: '.grip-handle',
            animation: 150,
            onEnd: function(){
                var items = document.querySelectorAll('#division-grid .division');
                var order = [];
                items.forEach(function(item, index){
                    order.push({ id: parseInt(item.getAttribute('my-data')), number: index });
                });
                $.ajax({
                    url: '/api/division/reorder',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(order)
                });
            }
        });
    }

    function initEmployeeSortable(){
        if(!admin) return;
        var grid = document.getElementById('guide-card-col');
        if(!grid) return;
        Sortable.create(grid, {
            handle: '.grip-handle',
            animation: 150,
            onEnd: function(){
                var items = document.querySelectorAll('#guide-card-col .card[data-id]');
                var order = [];
                items.forEach(function(item, index){
                    order.push({ id: parseInt(item.getAttribute('data-id')), number: index });
                });
                $.ajax({
                    url: '/api/employee/reorder',

                    contentType: 'application/json',
                    data: JSON.stringify(order)
                });
            }
        });
    }

    function initAllSortable(){
        initDeptSortable();
        initDivisionSortable();
        initEmployeeSortable();
    }

    // инициализация при загрузке
    document.addEventListener('DOMContentLoaded', function(){
        initAllSortable();
        // отрисовать сотрудников первого отдела
        if(departments.length > 0 && departments[0].divisions.length > 0){
            selectDivision('btn-div-0-0');
        }
    });
</script>
