<div class="task-wrapper h-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <!-- Task Card -->
                <div class="task-card">

                    <!-- Card Header — smoke -->
                    <div class="task-card__header">
                        <span class="tsk-b1"></span>
                        <span class="tsk-b2"></span>
                        <span class="tsk-b3"></span>
                        <span class="tsk-b4"></span>
                        <span class="tsk-m1"></span>
                        <span class="tsk-m2"></span>
                        <span class="tsk-m3"></span>
                        <span class="tsk-m4"></span>
                        <span class="tsk-f1"></span>
                        <span class="tsk-f2"></span>
                        <span class="tsk-f3"></span>
                        <span class="tsk-f4"></span>

                        <div class="task-card__icon">
                            <i class="bi bi-pencil-square"></i>
                        </div>
                        <div>
                            <div class="task-card__title">Редактор задач</div>
                            <div class="task-card__subtitle" th:text="'Задача #' + ${task.id}">Задача #0</div>
                        </div>
                    </div>

                    <form class="task-form" th:method="POST" th:action="@{/task/edit}" th:object="${task}">
                        <input type="number" th:field="*{id}" hidden>

                        <!-- Card Body -->
                        <div class="task-card__body">

                            <!-- Исполнитель (select) -->
                            <div class="task-select-group">
                                <span class="task-select-label">Автор задачи</span>
                                <select id="implementer" class="form-select" th:field="*{implementerId}">
                                    <option th:each="implementer : ${implementers}" th:value="${implementer.getId()}" th:text="${implementer.getFullName()}"></option>
                                </select>
                            </div>

                            <!-- Категория (select, каскадный) -->
                            <div class="task-select-group">
                                <span class="task-select-label">Категория</span>
                                <select id="category" class="form-select" th:field="*{categoryId}" onchange="setupTrouble2()">
                                    <option th:each="category : ${categories}" th:value="${category.getId()}" th:text="${category.getName()}"></option>
                                </select>
                            </div>

                            <!-- Проблема (select, каскадный, пустой изначально — JS заполнит) -->
                            <div class="task-select-group">
                                <span class="task-select-label">Проблема</span>
                                <select id="trouble" class="form-select" th:field="*{troubleId}"></select>
                            </div>

                            <!-- Заголовок (floating) -->
                            <div class="form-floating">
                                <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="ФИО или описание задачи">
                                <label for="title">ФИО или описание задачи</label>
                                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
                            </div>

                            <!-- Описание (floating textarea) -->
                            <div class="form-floating">
                                <textarea class="form-control" id="content" th:field="*{content}" placeholder="Описание" style="min-height: 130px;"></textarea>
                                <label for="content">Описание</label>
                                <span th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="field-error"></span>
                            </div>

                        </div>

                        <!-- Card Footer — дата + кнопка -->
                        <div class="task-card__footer">
                            <div class="task-footer-date">
                                <i class="bi bi-calendar3 task-footer-date__icon"></i>
                                <input type="date" class="form-control" th:field="*{placedAt}">
                                <span th:if="${#fields.hasErrors('placedAt')}" th:errors="*{placedAt}" class="field-error"></span>
                            </div>
                            <button type="submit" class="btn btn-smoke">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                        </div>
                    </form>

                </div>
                <!-- /Task Card -->

            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Инициализация — заполнить trouble select по выбранной категории
    (function(){
        let categoryId = document.getElementById("category").value;
        let tickets = [[${troubles}]];
        $('#trouble').empty();
        for(let i = 0; i < tickets.length; i++){
            if(tickets[i].categoryId == categoryId){
                $('#trouble').append(
                    '<option value="' + tickets[i].id + '">' + tickets[i].name + '</option>'
                )
            }
        }
        document.getElementById('trouble').value = [[${task}]].troubleId;
    })();

    function setupTrouble2(){
        let categoryId = document.getElementById("category").value;
        let tickets = [[${troubles}]];
        $('#trouble').empty();
        for(let i = 0; i < tickets.length; i++){
            if(tickets[i].categoryId == categoryId){
                $('#trouble').append(
                    '<option value="' + tickets[i].id + '">' + tickets[i].name + '</option>'
                )
            }
        }
    }
</script>
