<link rel="stylesheet" th:href="@{/css/stat.css}">

<div class="container-fluid px-4 py-3">
    <div class="row justify-content-center">
        <div class="col-12">

            <!-- Hero / Filter Bar -->
            <div class="stat-filter-card">
                <div class="stat-filter-card__header">
                    <i class="bi bi-diagram-3 stat-filter-card__icon"></i>
                    <span class="stat-filter-card__title">Информационные системы</span>
                    <span class="stf-b1"></span><span class="stf-b2"></span><span class="stf-b3"></span><span class="stf-b4"></span>
                    <span class="stf-m1"></span><span class="stf-m2"></span><span class="stf-m3"></span><span class="stf-m4"></span>
                    <span class="stf-f1"></span><span class="stf-f2"></span><span class="stf-f3"></span><span class="stf-f4"></span>
                </div>
                <div class="stat-filter-card__body">
                    <div class="row g-2 align-items-center w-100">
                        <div class="col-12 col-md-2">
                            <select id="typeFilter" class="form-select w-100" onchange="loadData();loadSystemList()">
                                <option value="ALL">Все системы</option>
                                <option value="INTERNAL">Внутренние</option>
                                <option value="EXTERNAL">Внешние</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-2">
                            <div class="dropdown w-100">
                                <button class="btn btn-outline-secondary w-100 text-start dropdown-toggle d-flex justify-content-between align-items-center" type="button" id="systemDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false" style="border:1px solid #dee2e6; border-radius:0.375rem;">
                                    <span class="text-truncate">Все системы</span>
                                </button>
                                <ul class="dropdown-menu px-2" id="systemCheckList" style="min-width:350px;max-height:250px;overflow-y:auto;" onclick="event.stopPropagation()">
                                    <li class="text-muted text-center py-1">Загрузка...</li>
                                </ul>
                            </div>
                        </div>
                        <div class="col-12 col-md-2">
                            <select id="statusFilter" class="form-select w-100" onchange="loadData()">
                                <option value="ALL">Все статусы</option>
                                <option value="ACTIVE">Активные</option>
                                <option value="INACTIVE">Неактивные</option>
                            </select>
                        </div>
                        <div class="col-12 col-md">
                            <div class="input-group w-100">
                                <input type="text" id="searchInput" class="form-control" placeholder="Поиск по названию системы или ФИО сотрудника..." onkeyup="debounceSearch()" onkeydown="if(event.key==='Enter')loadData()">
                                <button class="btn btn-smoke" onclick="loadData()" title="Найти"><i class="bi bi-search"></i></button>
                            </div>
                        </div>
                        <div class="col-12 col-md-1">
                            <button class="btn btn-smoke w-100 h-100" onclick="exportExcel()" title="Выгрузить в Excel"><i class="bi bi-file-earmark-text"></i></button>
                        </div>
                        <div class="col-12 text-end">
                            <span class="text-muted" id="resultCount" style="font-size:0.85rem;"></span>
                        </div>
                    </div>
                </div>

                <!-- Indicators inside hero -->
                <div class="d-flex gap-3 mt-3 flex-wrap px-3 pb-3" id="statsIndicators">
                    <div class="stat-summary-card flex-grow-1" style="min-width:140px;">
                        <div class="stat-summary-card__header">Количество систем</div>
                        <div class="stat-summary-card__body">
                            <div class="stat-total" id="statSystems">—</div>
                        </div>
                    </div>
                    <div class="stat-summary-card flex-grow-1" style="min-width:140px;">
                        <div class="stat-summary-card__header">Пользователей</div>
                        <div class="stat-summary-card__body">
                            <div class="stat-total" id="statTotal">—</div>
                        </div>
                    </div>
                    <div class="stat-summary-card flex-grow-1" style="min-width:140px;">
                        <div class="stat-summary-card__header">Активные</div>
                        <div class="stat-summary-card__body">
                            <div class="stat-total text-success" id="statActive">—</div>
                        </div>
                    </div>
                    <div class="stat-summary-card flex-grow-1" style="min-width:140px;">
                        <div class="stat-summary-card__header">Неактивные</div>
                        <div class="stat-summary-card__body">
                            <div class="stat-total text-danger" id="statInactive">—</div>
                        </div>
                        <!-- /Indicators -->

                    </div>
                </div>
            </div>

            <!-- Grid -->
            <div id="report-grid" class="d-flex flex-column gap-3"></div>

        </div>
    </div>
</div>

<!-- System Detail Modal -->
<div class="modal fade" id="sysDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="border-radius: 12px; border: 1px solid #d4d4d4;">
            <div class="modal-header" style="background: linear-gradient(160deg, #0d0d0d 0%, #1a1a1a 50%, #111 100%); color: #e0e0e0; border-radius: 11px 11px 0 0;">
                <h5 class="modal-title" id="sysDetailTitle">Подробности</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="sysDetailBody"></div>
            <div class="modal-footer" style="background: #fafafa; border-top: 1px solid #eee;">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- Employee Detail Modal -->
<div class="modal fade" id="empDetailModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 12px; border: 1px solid #d4d4d4;">
            <div class="modal-header" style="background: linear-gradient(160deg, #0d0d0d 0%, #1a1a1a 50%, #111 100%); color: #e0e0e0; border-radius: 11px 11px 0 0;">
                <h5 class="modal-title" id="empDetailTitle">Детали сотрудника</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="empDetailBody"></div>
            <div class="modal-footer" style="background: #fafafa; border-top: 1px solid #eee;">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/
/* ============================================================
   PRESENTATION
   ============================================================ */

var searchTimer = null, sysDetailBsModal, empDetailBsModal;

function renderSystemCard(report) {
    var sys = report.system;
    var typeBadge = sys.systemType === 'INTERNAL'
        ? '<span class="badge bg-dark">Внутренняя</span>'
        : '<span class="badge bg-secondary">Внешняя</span>';

    var urlLink = sys.url ? '<div class="mt-1"><i class="bi bi-link-45deg"></i> <a href="' + escapeHtml(sys.url) + '" target="_blank">' + escapeHtml(sys.url) + '</a></div>' : '';

    var empCards = '';
    if (report.employees && report.employees.length > 0) {
        for (var i = 0; i < report.employees.length; i++) {
            empCards += renderEmployeeCard(report.employees[i], sys.uuid);
        }
    } else {
        empCards = '<p class="text-muted mb-0" style="font-size:0.85rem;">Нет привязанных сотрудников</p>';
    }

    return '<div class="stat-card" style="border:1px solid #d4d4d4; border-radius:12px; overflow:hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom:0;">'
        + '<div style="position:relative; background:linear-gradient(160deg,#0d0d0d 0%,#1a1a1a 50%,#111 100%); color:#e0e0e0; padding:0.75rem 1.25rem; display:flex; align-items:center; justify-content:space-between; border-radius:12px 12px 0 0;">'
        + '<div class="d-flex align-items-center gap-2">' + typeBadge + ' <strong>' + escapeHtml(sys.name) + '</strong></div>'
        + '<button class="btn btn-sm btn-outline-light" onclick="openSysDetail(\'' + sys.uuid + '\')" title="Подробности"><i class="bi bi-info-circle"></i> Подробности</button>'
        + '</div>'
        + '<div style="background:#fff; padding:0.75rem 1.25rem;">'
        + (sys.shortDescription ? '<p class="mb-1">' + escapeHtml(sys.shortDescription) + '</p>' : '')
        + urlLink
        + '</div>'
        + '<div style="background:#fafafa; padding:0.5rem 1rem; border-top:1px solid #eee;">'
        + empCards
        + '</div></div>';
}

function renderEmployeeCard(emp, sysUuid) {
    var isActive = emp.status === 'ACTIVE';
    var statusDot = '<span class="d-inline-block rounded-circle me-1" style="width:10px;height:10px;background:' + (isActive ? '#28a745' : '#dc3545') + ';" title="' + (isActive ? 'Активный' : 'Неактивный') + '"></span>';
    var dates = '<small class="text-muted">' + (emp.connectDate || '—');
    if (!isActive && emp.disconnectDate) dates += ' → ' + emp.disconnectDate;
    dates += '</small>';

    return '<div class="d-flex align-items-center justify-content-between py-1 border-bottom" style="cursor:pointer;" onclick="openEmpDetail(\'' + sysUuid + '\', ' + emp.employeeId + ', \'' + escapeJs(emp.lastname + ' ' + emp.name) + '\')">'
        + '<div>' + statusDot + '<strong>' + escapeHtml(emp.lastname) + ' ' + escapeHtml(emp.name) + ' ' + escapeHtml(emp.middleName) + '</strong>'
        + (emp.position ? ' <small class="text-muted">(' + escapeHtml(emp.position) + ')</small>' : '')
        + (emp.departmentTitle ? ' <span class="badge rounded-4" style="background:#d4edda;color:#155724;">' + escapeHtml(emp.departmentTitle) + '</span>' : '')
        + (emp.divisionTitle ? ' <span class="badge rounded-4 ms-1" style="background:#fff3cd;color:#856404;">' + escapeHtml(emp.divisionTitle) + '</span>' : '')
        + '</div>'
        + '<div>' + dates + '</div>'
        + '</div>';
}

function renderEmpty() {
    return '<div class="text-center text-secondary py-5">'
        + '<i class="bi bi-inbox" style="font-size:3rem;"></i>'
        + '<p class="mt-2 fs-5">Системы не найдены</p>'
        + '</div>';
}

/* ============================================================
   LOGIC
   ============================================================ */

function loadData() {
    var search = document.getElementById('searchInput').value.trim();
    var type = document.getElementById('typeFilter').value;
    var status = document.getElementById('statusFilter').value;

    var url = '/api/report/systems?search=' + encodeURIComponent(search) + '&type=' + encodeURIComponent(type) + '&employee=' + encodeURIComponent(search) + '&status=' + encodeURIComponent(status);

    fetch(url, { headers: { 'Accept': 'application/json' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var selected = getSelectedSystemNames();
        if (selected.length > 0) {
            data = data.filter(function(r) { return selected.indexOf(r.system.name) >= 0; });
        }
        updateStats(data);
        var grid = document.getElementById('report-grid');
        if (!data || data.length === 0) {
            grid.innerHTML = renderEmpty();
        } else {
            grid.innerHTML = data.map(renderSystemCard).join('');
        }
    });
}

function getSelectedSystemNames() {
    var checks = document.querySelectorAll('#systemCheckList input[type="checkbox"]:checked');
    var names = [];
    for (var i = 0; i < checks.length; i++) names.push(checks[i].value);
    return names;
}

function loadSystemList() {
    var type = document.getElementById('typeFilter').value;
    var url = '/api/report/systems?type=' + encodeURIComponent(type);
    fetch(url, { headers: { 'Accept': 'application/json' } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var list = document.getElementById('systemCheckList');
        if (!data || data.length === 0) {
            list.innerHTML = '<li class="text-muted text-center py-1">Нет систем</li>';
            return;
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
            html += '<li class="dropdown-item" style="cursor:default;">'
                + '<label class="w-100 mb-0" style="cursor:pointer;">'
                + '<input type="checkbox" value="' + escapeHtml(data[i].system.name) + '" onchange="onSystemCheckChange()" class="me-2">'
                + escapeHtml(data[i].system.name) + '</label></li>';
        }
        list.innerHTML = html;
        onSystemCheckChange();
    });
}

function onSystemCheckChange() {
    var selected = getSelectedSystemNames();
    var span = document.querySelector('#systemDropdownBtn span');
    if (selected.length === 0) {
        span.textContent = 'Все системы';
    } else if (selected.length <= 2) {
        span.textContent = selected.join(', ');
    } else {
        span.textContent = 'Выбрано: ' + selected.length;
    }
    loadData();
}

function updateStats(data) {
    var systems = data ? data.length : 0;
    var total = 0, active = 0, inactive = 0;
    if (data) {
        for (var i = 0; i < data.length; i++) {
            var emps = data[i].employees || [];
            total += emps.length;
            for (var j = 0; j < emps.length; j++) {
                if (emps[j].status === 'ACTIVE') active++; else inactive++;
            }
        }
    }
    document.getElementById('statSystems').textContent = systems;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statInactive').textContent = inactive;
}

function loadStats() {
    var type = document.getElementById('typeFilter').value;
    fetch('/api/report/systems/stats?type=' + encodeURIComponent(type))
    .then(function(r) { return r.json(); })
    .then(function(s) {
        document.getElementById('statSystems').textContent = s.systemsCount || 0;
        document.getElementById('statTotal').textContent = s.totalEmployees || 0;
        document.getElementById('statActive').textContent = s.activeCount || 0;
        document.getElementById('statInactive').textContent = s.inactiveCount || 0;
    });
}

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadData, 400);
}

function openSysDetail(uuid) {
    fetch('/api/system/' + uuid)
    .then(function(r) { return r.json(); })
    .then(function(sys) {
        var typeBadge = sys.systemType === 'INTERNAL'
            ? '<span class="badge bg-dark">Внутренняя</span>'
            : '<span class="badge bg-secondary">Внешняя</span>';
        var detailLines = sys.detailedDescription ? sys.detailedDescription.replace(/\n/g, '<br>') : '—';
        var urlLink = sys.url ? '<a href="' + escapeHtml(sys.url) + '" target="_blank">' + escapeHtml(sys.url) + '</a>' : '—';

        document.getElementById('sysDetailTitle').textContent = sys.name;
        document.getElementById('sysDetailBody').innerHTML =
            '<p>' + typeBadge + ' <strong>' + escapeHtml(sys.name) + '</strong></p>'
            + '<p><small class="text-muted">Краткое описание</small><br>' + (sys.shortDescription || '—') + '</p>'
            + '<p><small class="text-muted">Детальное описание</small><br><span style="white-space:pre-wrap;">' + detailLines + '</span></p>'
            + '<p><small class="text-muted">Ссылка</small><br>' + urlLink + '</p>';

        if (!sysDetailBsModal) sysDetailBsModal = new bootstrap.Modal(document.getElementById('sysDetailModal'));
        sysDetailBsModal.show();
    });
}

function openEmpDetail(sysUuid, empId, empName) {
    document.getElementById('empDetailTitle').textContent = 'Детали: ' + empName;

    fetchWithCsrf('/api/system/' + sysUuid + '/employees/' + empId)
    .then(function(r) { return r.json(); })
    .then(function(b) {
        var statusBadge = b.status === 'ACTIVE'
            ? '<span class="badge bg-success">Активный</span>'
            : '<span class="badge bg-danger">Неактивный</span>';
        document.getElementById('empDetailBody').innerHTML =
            '<p><strong>Статус:</strong> ' + statusBadge + '</p>'
            + '<p><strong>Дата подключения:</strong> ' + (b.connectDate || '—') + '</p>'
            + (b.status === 'INACTIVE' ? '<p><strong>Дата отключения:</strong> ' + (b.disconnectDate || '—') + '</p>' : '')
            + '<p><strong>МЧД:</strong> ' + (b.mchd ? '<br><span style="white-space:pre-wrap;">' + escapeHtml(b.mchd) + '</span>' : '—') + '</p>'
            + '<p><strong>Основание выдачи МЧД:</strong> ' + (b.mchdBasis ? '<br><span style="white-space:pre-wrap;">' + escapeHtml(b.mchdBasis) + '</span>' : '—') + '</p>'
            + '<p><strong>Срок действия МЧД:</strong> ' + (b.mchdExpiry || '—') + '</p>'
            + '<p><strong>Роль в системе:</strong> ' + (b.roleInSystem ? '<br><span style="white-space:pre-wrap;">' + escapeHtml(b.roleInSystem) + '</span>' : '—') + '</p>'
            + '<p><strong>Допуски:</strong> ' + (b.accesses ? '<br><span style="white-space:pre-wrap;">' + escapeHtml(b.accesses) + '</span>' : '—') + '</p>'
            + '<p><strong>Основание заведения пользователя:</strong> ' + (b.foundation ? '<br><span style="white-space:pre-wrap;">' + escapeHtml(b.foundation) + '</span>' : '—') + '</p>';

        if (!empDetailBsModal) empDetailBsModal = new bootstrap.Modal(document.getElementById('empDetailModal'));
        empDetailBsModal.show();
    });
}

function fetchWithCsrf(url, opts) {
    opts = opts || {};
    opts.headers = opts.headers || {};
    opts.headers[document.querySelector("meta[name='_csrf_header']").getAttribute("content")] = document.querySelector("meta[name='_csrf']").getAttribute("content");
    return fetch(url, opts);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeJs(str) {
    if (!str) return '';
    return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

// Init
(function(){ loadData(); loadSystemList(); })();

function exportExcel() {
    var search = document.getElementById('searchInput').value.trim();
    var type = document.getElementById('typeFilter').value;
    var status = document.getElementById('statusFilter').value;
    var selected = getSelectedSystemNames();
    var url = '/api/report/systems/excel?search=' + encodeURIComponent(search) + '&type=' + encodeURIComponent(type) + '&employee=' + encodeURIComponent(search) + '&status=' + encodeURIComponent(status);
    if (selected.length > 0) {
        url += '&systems=' + encodeURIComponent(selected.join(','));
    }
    window.location.href = url;
}
/*]]>*/
</script>
