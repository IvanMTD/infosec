<div class="task-wrapper h-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <!-- Task Card -->
                <div class="task-card">

                    <!-- Card Header — smoke -->
                    <div class="task-card__header">
                        <span class="tsk-b1"></span>
                        <span class="tsk-b2"></span>
                        <span class="tsk-b3"></span>
                        <span class="tsk-b4"></span>
                        <span class="tsk-m1"></span>
                        <span class="tsk-m2"></span>
                        <span class="tsk-m3"></span>
                        <span class="tsk-m4"></span>
                        <span class="tsk-f1"></span>
                        <span class="tsk-f2"></span>
                        <span class="tsk-f3"></span>
                        <span class="tsk-f4"></span>

                        <div class="task-card__icon">
                            <i class="bi bi-check2-circle"></i>
                        </div>
                        <div>
                            <div class="task-card__title">Закрытие заявки</div>
                            <div class="task-card__subtitle" th:text="'Исполнитель — ' + ${userName}"></div>
                        </div>
                    </div>

                    <!-- Нет категорий — пользователь без службы -->
                    <div th:if="${#lists.isEmpty(troubleTickets)}">
                        <div class="task-card__body">
                            <div class="stat-empty text-center py-5">
                                <i class="bi bi-exclamation-circle fs-1" style="color:#bbb;"></i>
                                <p class="mt-3" style="color:#888;">
                                    Вы не можете закрывать заявки в связи с отсутствием принадлежности к службе.<br>
                                    <small>Обратитесь к администратору для назначения службы.</small>
                                </p>
                            </div>
                        </div>
                    </div>

                    <form th:unless="${#lists.isEmpty(troubleTickets)}" class="task-form" th:method="POST" th:action="@{/task/new/add}" th:object="${task}">

                        <!-- Card Body -->
                        <div class="task-card__body">

                            <!-- Выбор категории (select — свой label) -->
                            <div class="task-select-group">
                                <span class="task-select-label">Категория</span>
                                <select class="form-select" id="select" onchange="setupTrouble()">
                                    <option th:each="ticket : ${troubleTickets}" th:text="${ticket.getCategoryName()}" th:value="${ticket.getCategoryId()}"></option>
                                </select>
                            </div>

                            <!-- Выбор проблемы (select — каскадный) -->
                            <div class="task-select-group">
                                <span class="task-select-label">Проблема</span>
                                <select class="form-select" id="trouble_select" th:field="*{troubleId}">
                                    <option th:each="trouble : ${troubleTickets[0].getTroubles()}" th:text="${trouble.getName()}" th:value="${trouble.getId()}"></option>
                                </select>
                            </div>

                            <!-- Название (floating) -->
                            <div class="form-floating">
                                <input type="text" class="form-control" id="title" th:field="*{title}" placeholder="ФИО или общее название">
                                <label for="title">ФИО или общее название</label>
                                <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="field-error"></span>
                            </div>

                            <!-- Описание (floating textarea) -->
                            <div class="form-floating">
                                <textarea class="form-control" id="description" th:field="*{description}" placeholder="Опишите проблему" style="min-height: 130px;"></textarea>
                                <label for="description">Описание проблемы</label>
                                <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="field-error"></span>
                            </div>

                        </div>

                        <!-- Время выполнения -->
                        <div class="row pt-2 g-2 mx-0">
                            <div class="col-6 form-floating px-0">
                                <input type="datetime-local" class="form-control" id="startTime" th:field="*{startTime}" placeholder="start" onchange="syncDateFromStart()">
                                <label for="startTime" class="ms-2">Начало выполнения</label>
                            </div>
                            <div class="col-6 form-floating px-0" id="endTimeGroup">
                                <input type="datetime-local" class="form-control" id="endTime" th:field="*{endTime}" placeholder="end">
                                <label for="endTime" class="ms-2">Окончание выполнения</label>
                            </div>
                        </div>

                        <!-- Card Footer — переключатель + кнопка -->
                        <div class="task-card__footer">
                            <div class="task-footer-date">
                                <i class="bi bi-calendar3 task-footer-date__icon"></i>
                                <input type="hidden" th:field="*{executeDate}" id="executeDateHidden">
                                <div class="form-check form-switch ms-2">
                                    <input class="form-check-input" type="checkbox" id="allDayToggle" onchange="toggleAllDay()">
                                    <label class="form-check-label" for="allDayToggle">Весь день</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-smoke">
                                <i class="bi bi-check-lg"></i> Записать
                            </button>
                        </div>
                    </form>

                </div>
                <!-- /Task Card -->

            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var workDayEnd = /*[[${workDayEnd}]]*/ '18:00';
    /*]]>*/

    function setupTrouble(){
        let categoryId = document.getElementById("select").value;
        let tickets = [[${troubleTickets}]];
        for(let i = 0; i < tickets.length; i++){
            if(tickets[i].categoryId == categoryId){
                $('#trouble_select').html('');
                tickets[i].troubles.forEach((trouble) => {
                    $('#trouble_select').append(
                        '<option value="' + trouble.id + '">' + trouble.name + '</option>'
                    )
                })
            }
        }
    }

    // Синхронизация executeDate (hidden) из startTime
    function syncDateFromStart(){
        let st = document.getElementById("startTime").value;
        if(st){
            document.getElementById("executeDateHidden").value = st.substring(0,10);
            // Если «Весь день» включён — пересчитать endTime
            if(document.getElementById("allDayToggle").checked){
                setAllDayEnd();
            }
        }
    }

    // Включение/выключение «Весь день»
    function toggleAllDay(){
        let toggle = document.getElementById("allDayToggle");
        let endGroup = document.getElementById("endTimeGroup");
        if(toggle.checked){
            endGroup.style.display = 'none';
            setAllDayEnd();
        }else{
            endGroup.style.display = '';
            document.getElementById("endTime").value = '';
        }
    }

    function setAllDayEnd(){
        let st = document.getElementById("startTime").value;
        if(st){
            let endStr = st.substring(0,10) + 'T' + workDayEnd + ':00';
            document.getElementById("endTime").value = endStr;
        }
    }

    // Инициализация: если startTime уже заполнен — синхронизировать executeDate
    (function(){
        let st = document.getElementById("startTime").value;
        if(st){
            document.getElementById("executeDateHidden").value = st.substring(0,10);
        }
    })();
</script>
